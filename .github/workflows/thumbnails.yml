name: thumbnail generators

on:
  pull_request:
    paths:
      - "images/**"
      - "tools/make-thumbs.*"
      - "tools/check-thumbs.py"
      - ".github/workflows/thumbnails.yml"
  push:
    paths:
      - "images/**"
      - "tools/make-thumbs.*"
      - "tools/check-thumbs.py"
      - ".github/workflows/thumbnails.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos / sips
            os: macos-latest
          - name: windows / system.drawing
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Remove checked-in derivatives
        shell: pwsh
        run: Remove-Item -LiteralPath images/thumbs -Recurse -Force -ErrorAction SilentlyContinue

      - name: Generate on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./tools/make-thumbs.sh

      - name: Generate on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/make-thumbs.ps1

      - name: Verify originals are untouched
        shell: bash
        run: git diff --exit-code -- images ':(exclude)images/thumbs/**'

      - name: Verify generated output on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: python3 tools/check-thumbs.py

      - name: Verify generated output on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: python tools/check-thumbs.py
